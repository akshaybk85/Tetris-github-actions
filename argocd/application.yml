apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tetrics
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/akshaybk85/Tetris-github-actions.git
    targetRevision: main
    path: k8s
  destination: 
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy: 
    automated: 
      prune: true
      selfHeal: true
      
